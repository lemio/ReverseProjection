<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ReverseProjection</title>
  <link rel="manifest" href="/phone/manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/phone/css/phone.css">
</head>
<body>
  <div id="phone-app">
    <!-- AR marker — fixed size, always visible at the top -->
    <canvas id="marker-single" data-marker-id="0"></canvas>

    <!-- Spinner shown in top-right when the laptop can't see the marker -->
    <div id="detect-spinner"></div>

    <!-- Connecting overlay — shown briefly while the socket handshakes -->
    <div id="connecting-screen">
      <div class="connect-card">
        <div class="connect-spinner"></div>
        <p>Connecting...</p>
        <p id="connect-status"></p>
      </div>
    </div>

    <div id="example-area" style="display:none;">
      <div id="example-content"></div>
      <div id="status-bar">
        <span id="example-name">Map</span>
        <span id="connection-indicator" class="connected">Live</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/phone/js/drawMarker.js"></script>
  <script src="/phone/js/examples/mapPhone.js"></script>
  <script src="/phone/js/examples/tldrawPhone.js"></script>
  <script src="/phone/js/phoneApp.js"></script>
  <script>
    // Generate or retrieve a stable client ID (persists across refreshes so the
    // server gives this device the same marker ID every time).
    (function() {
      var stored = localStorage.getItem('rpClientId');
      if (!stored) {
        // Standard UUID v4 format: xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx
        stored = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
        localStorage.setItem('rpClientId', stored);
      }
      window.RP_CLIENT_ID = stored;
    })();

    // Draw initial marker (ID 0) — phoneApp.js will redraw with the server-assigned ID
    (function() {
      var s = document.getElementById('marker-single');
      drawJSARMarker(s, 0, s.offsetWidth || 280);
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/phone/sw.js').catch(console.error);
    }
  </script>
</body>
</html>
