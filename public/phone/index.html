<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ReverseProjection Phone</title>
  <link rel="manifest" href="/phone/manifest.json">
  <link rel="stylesheet" href="/phone/css/phone.css">
</head>
<body>
  <div id="phone-app">
    <div class="corner-marker" id="marker-tl"></div>
    <div class="corner-marker" id="marker-tr"></div>
    <div class="corner-marker" id="marker-bl"></div>
    <div class="corner-marker" id="marker-br"></div>

    <div id="connection-screen">
      <div class="connect-card">
        <h2>🎯 ReverseProjection</h2>
        <p>Enter the room code shown on the laptop:</p>
        <input id="room-input" type="text" placeholder="Room Code" maxlength="6" autocapitalize="characters">
        <button id="join-btn">Join Room</button>
        <p id="connect-status"></p>
      </div>
    </div>

    <div id="example-area" style="display:none;">
      <div id="example-content"></div>
      <div id="status-bar">
        <span id="example-name">Map</span>
        <span id="connection-indicator" class="connected">● Live</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/phone/js/examples/mapPhone.js"></script>
  <script src="/phone/js/examples/pongPhone.js"></script>
  <script src="/phone/js/phoneApp.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/phone/sw.js').catch(console.error);
    }
  </script>
</body>
</html>
